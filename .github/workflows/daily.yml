name: Daily News Wordcloud

on:
  schedule:
    - cron: "0 8 * * *"  # UTC 08:00 = 台灣時間 16:00，一天一次（GitHub cron常延遲，給收盤後緩衝）
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "跳過抓新聞，只用現有資料重新統計/產圖(改了keywords.json或停用詞後手動更新用)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system font
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set date
        id: meta
        run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Fetch news (前一天18:00到今天18:00)
        if: github.event.inputs.skip_fetch != 'true'
        run: python scripts/fetch_news.py ${{ steps.meta.outputs.today }} --backfill

      - name: Process text
        run: python scripts/process_text.py ${{ steps.meta.outputs.today }}

      - name: Generate wordclouds
        run: python scripts/generate_wordcloud.py

      - name: Package release assets
        run: |
          mkdir -p release
          cp docs/data/leaderboard.json release/leaderboard.json
          cp output/leaderboard_3d.csv release/leaderboard_3d.csv
          cp output/leaderboard_7d.csv release/leaderboard_7d.csv
          cp output/leaderboard_15d.csv release/leaderboard_15d.csv
          cp data/${{ steps.meta.outputs.today }}.json release/news_${{ steps.meta.outputs.today }}.json
          cp output/wordfreq_3d.csv release/wordfreq_3d.csv
          cp output/wordfreq_7d.csv release/wordfreq_7d.csv
          cp output/wordfreq_15d.csv release/wordfreq_15d.csv
          cp output/wordcloud_3d.png release/wordcloud_3d.png
          cp output/wordcloud_7d.png release/wordcloud_7d.png
          cp output/wordcloud_15d.png release/wordcloud_15d.png
          cp keywords.json release/keywords.json
          cd release && zip -r ../twstock-wordcloud-${{ steps.meta.outputs.today }}.zip .

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs/data docs/wordcloud keywords.json watchlist.json pending_keywords.json
          git diff --cached --quiet || git commit -m "更新每日題材熱度統計 ${{ steps.meta.outputs.today }}"
          git push

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.today }}
          name: 台股財經新聞詞雲 ${{ steps.meta.outputs.today }}
          files: twstock-wordcloud-${{ steps.meta.outputs.today }}.zip

      # 由本workflow直接部署Pages：用GITHUB_TOKEN推送的commit不會觸發pages.yml，
      # 所以資料更新後必須在同一個run裡自己部署，否則網站會停在舊資料。
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
