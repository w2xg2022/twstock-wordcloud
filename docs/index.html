<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股財經新聞詞雲</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>台股財經新聞詞雲</h1>
    <p class="subtitle">以台股為主、亞股美股為輔，每日自動彙整 Google News + GDELT 財經新聞</p>
  </header>

  <main>
    <section class="tabs">
      <button class="tab-btn active" data-days="3">近3日</button>
      <button class="tab-btn" data-days="7">近7日</button>
      <button class="tab-btn" data-days="15">近15日</button>
    </section>

    <section class="wordcloud-section">
      <img id="wordcloud-img" alt="題材熱度詞雲">
      <p id="wordcloud-status" class="status"></p>
    </section>

    <section class="leaderboard-section">
      <h2>財經熱詞排行榜（當日）</h2>
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>名次</th>
            <th>熱詞</th>
            <th>次數</th>
            <th>漲跌</th>
            <th>入榜天數</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="download-section">
      <h2>資料下載</h2>
      <p>每日資料會打包成 GitHub Release，內含原始新聞、詞頻CSV與靜態詞雲圖：</p>
      <a href="https://github.com/w2xg2022/twstock-wordcloud/releases/latest">前往最新 Release 下載</a>
    </section>
  </main>

  <footer>
    <p>資料來源：Google News RSS、GDELT Project</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
